<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>숨바꼭질 P2P 게임</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: sans-serif;
            background: #222;
            color: white;
            touch-action: none;
        }
        #lobby, #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #game-container { display: none; position: relative; }
        #background-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        #game-canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
        }
        #ui-overlay {
            position: absolute;
            top: 10px; left: 10px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #controls {
            position: absolute;
            bottom: 20px;
            z-index: 10;
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 10px 20px;
            background: #444;
            border: 1px solid #fff;
            color: white;
            cursor: pointer;
            pointer-events: auto;
        }
        #qrcode {
            background: white;
            padding: 10px;
            margin: 20px;
        }
        #status { margin: 10px; text-align: center; }
        .hidden { display: none; }
        
        /* 숨는 사람 위장용 컬러 피커 */
        #color-picker {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 11;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .color-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="lobby">
    <h1>숨바꼭질 게임</h1>
    <div id="status">연결 중...</div>
    <div id="qrcode-container" class="hidden">
        <p>상대방을 초대하세요 (QR 스캔):</p>
        <div id="qrcode"></div>
        <p id="peer-id-display"></p>
    </div>
</div>

<div id="game-container">
    <img id="background-img" src="a.jpg" style="display:none;">
    <canvas id="game-canvas"></canvas>
    <div id="ui-overlay">
        <h2 id="role-text">역할 배정 중...</h2>
        <p id="game-status">상대방을 기다리는 중...</p>
    </div>
    <div id="color-picker" class="hidden">
        <div class="color-dot" style="background: #ff0000;" data-color="#ff0000"></div>
        <div class="color-dot" style="background: #00ff00;" data-color="#00ff00"></div>
        <div class="color-dot" style="background: #0000ff;" data-color="#0000ff"></div>
        <div class="color-dot" style="background: #ffff00;" data-color="#ffff00"></div>
        <div class="color-dot" style="background: #ffffff;" data-color="#ffffff"></div>
        <div class="color-dot" style="background: #000000;" data-color="#000000"></div>
        <div class="color-dot" style="background: #8B4513;" data-color="#8B4513"></div>
        <div class="color-dot" style="background: #228B22;" data-color="#228B22"></div>
    </div>
</div>

<script>
    const lobby = document.getElementById('lobby');
    const gameContainer = document.getElementById('game-container');
    const statusDiv = document.getElementById('status');
    const qrcodeContainer = document.getElementById('qrcode-container');
    const peerIdDisplay = document.getElementById('peer-id-display');
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const bgImg = document.getElementById('background-img');
    const roleText = document.getElementById('role-text');
    const gameStatus = document.getElementById('game-status');
    const colorPicker = document.getElementById('color-picker');

    let peer, conn;
    let myId, targetId;
    let isHost = false;
    let role = null; // 'hider' or 'seeker'
    let gameState = 'waiting';

    // 플레이어 데이터
    let me = { x: 100, y: 100, color: '#ffffff', size: 30, drawing: [] };
    let opponent = { x: -100, y: -100, color: '#ffffff', size: 30, drawing: [] };
    let selectedColor = '#ffffff';

    // URL 파라미터 확인
    const urlParams = new URLSearchParams(window.location.search);
    const joinId = urlParams.get('join');

    function initPeer() {
        peer = new Peer();
        
        peer.on('open', (id) => {
            myId = id;
            if (joinId) {
                statusDiv.innerText = "호스트에게 연결 중...";
                connectToPeer(joinId);
            } else {
                isHost = true;
                statusDiv.innerText = "호스트 모드";
                qrcodeContainer.classList.remove('hidden');
                peerIdDisplay.innerText = "내 ID: " + id;
                const joinUrl = window.location.origin + window.location.pathname + "?join=" + id;
                new QRCode(document.getElementById("qrcode"), {
                    text: joinUrl,
                    width: 128,
                    height: 128
                });
            }
        });

        peer.on('connection', (connection) => {
            conn = connection;
            setupConnection();
        });

        peer.on('error', (err) => {
            console.error(err);
            alert("PeerJS 오류: " + err.type);
        });
    }

    function connectToPeer(id) {
        conn = peer.connect(id);
        setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => {
            statusDiv.innerText = "연결 성공! 게임을 시작합니다.";
            setTimeout(startGame, 1000);
        });

        conn.on('data', (data) => {
            handleData(data);
        });
    }

    function startGame() {
        lobby.style.display = 'none';
        gameContainer.style.display = 'flex';
        resizeCanvas();
        
        if (isHost) {
            // 역할 배정 (50% 확률로 숨는 사람)
            role = Math.random() < 0.5 ? 'hider' : 'seeker';
            const oppRole = role === 'hider' ? 'seeker' : 'hider';
            conn.send({ type: 'init-role', role: oppRole });
            setRole(role);
        }
        
        requestAnimationFrame(gameLoop);
    }

    function setRole(r) {
        role = r;
        roleText.innerText = role === 'hider' ? "당신은 숨는 사람입니다!" : "당신은 술래입니다!";
        gameStatus.innerText = role === 'hider' ? "위장하고 숨으세요!" : "숨은 사람을 찾으세요!";
        
        if (role === 'hider') {
            colorPicker.classList.remove('hidden');
            me.x = Math.random() * (canvas.width - 100) + 50;
            me.y = Math.random() * (canvas.height - 100) + 50;
        } else {
            me.x = canvas.width / 2;
            me.y = canvas.height / 2;
        }
    }

    function handleData(data) {
        if (data.type === 'init-role') {
            setRole(data.role);
        } else if (data.type === 'update') {
            opponent.x = data.x;
            opponent.y = data.y;
            opponent.drawing = data.drawing || [];
        } else if (data.type === 'catch') {
            if (role === 'hider') {
                alert("들켰습니다! 술래가 승리했습니다.");
                location.reload();
            }
        }
    }

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resizeCanvas);

    // 입력 처리
    let isDrawing = false;
    
    function handleMove(e) {
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        
        me.x = x;
        me.y = y;

        if (isDrawing && role === 'hider') {
            // 상대 좌표로 저장
            me.drawing.push({ dx: 0, dy: 0, color: selectedColor, time: Date.now() });
            // 간단하게 하기 위해 마지막 색상으로 칠함
            me.color = selectedColor;
        }
        
        sendUpdate();
    }

    function sendUpdate() {
        if (conn && conn.open) {
            conn.send({
                type: 'update',
                x: me.x,
                y: me.y,
                color: me.color,
                drawing: me.drawing
            });
        }
    }

    canvas.addEventListener('mousedown', (e) => { 
        isDrawing = true; 
        if (role === 'seeker') {
            checkCatch();
        }
    });
    canvas.addEventListener('mousemove', handleMove);
    canvas.addEventListener('mouseup', () => isDrawing = false);

    canvas.addEventListener('touchstart', (e) => { 
        isDrawing = true; 
        if (role === 'seeker') {
            checkCatch();
        }
    });
    canvas.addEventListener('touchmove', handleMove);
    canvas.addEventListener('touchend', () => isDrawing = false);

    function checkCatch() {
        const dist = Math.hypot(me.x - opponent.x, me.y - opponent.y);
        if (dist < 40) {
            conn.send({ type: 'catch' });
            alert("잡았습니다! 승리했습니다.");
            location.reload();
        }
    }

    // 컬러 피커 이벤트
    document.querySelectorAll('.color-dot').forEach(dot => {
        dot.addEventListener('click', (e) => {
            selectedColor = e.target.dataset.color;
            me.color = selectedColor;
            sendUpdate();
        });
    });

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 배경 그리기
        if (bgImg.complete) {
            ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
        }

        // 상대방 그리기 (술래에게는 숨는 사람이 위장한 색으로 보임)
        drawPlayer(opponent, opponent.color);

        // 내 캐릭터 그리기
        drawPlayer(me, me.color);

        requestAnimationFrame(gameLoop);
    }

    function drawPlayer(p, color) {
        if (p.x < 0) return;
        
        ctx.save();
        ctx.translate(p.x, p.y);
        
        // 캐릭터 본체
        ctx.beginPath();
        ctx.arc(0, 0, 15, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.3)";
        ctx.stroke();
        
        // 눈 (위장 중에도 약간은 보이게)
        ctx.fillStyle = "black";
        ctx.beginPath();
        ctx.arc(-5, -5, 2, 0, Math.PI * 2);
        ctx.arc(5, -5, 2, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.restore();
    }

    initPeer();
</script>

</body>
</html>
